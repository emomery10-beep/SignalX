<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="AskBiz">
  <title>AskBiz mark</title>
  <desc>Camera viewfinder brackets framing a phone with a lens — AskBiz.</desc>
  <!-- viewfinder brackets -->
  <g fill="none" stroke="#1A1410" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6,18 V6 H18"/>
    <path d="M46,6 H58 V18"/>
    <path d="M6,46 V58 H18"/>
    <path d="M58,46 V58 H46"/>
  </g>
  <!-- phone -->
  <rect x="23" y="15" width="18" height="34" rx="6" fill="#C97A44"/>
  <!-- lens -->
  <circle cx="32" cy="33" r="6" fill="none" stroke="#1A1410" stroke-width="3.2"/>
  <circle cx="32" cy="33" r="2.4" fill="#1A1410"/>
</svg>
