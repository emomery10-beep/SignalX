<svg xmlns="http://www.w3.org/2000/svg" width="300" height="88" viewBox="0 0 300 88" role="img" aria-label="AskBiz">
  <title>AskBiz</title>
  <style>
    .wm { font-family: 'Plus Jakarta Sans','Sora',system-ui,-apple-system,'Segoe UI',sans-serif; font-weight: 800; font-size: 46px; letter-spacing: -1.6px; }
    .ink { fill: #1A1410; }
    .acc { fill: #C97A44; }
    @media (prefers-color-scheme: dark) { .ink { fill: #F5F1EA; } }
  </style>

  <!-- mark on tile -->
  <g transform="translate(8,12)">
    <rect width="64" height="64" rx="14" fill="#C97A44"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6,18 V6 H18"/>
      <path d="M46,6 H58 V18"/>
      <path d="M6,46 V58 H18"/>
      <path d="M58,46 V58 H46"/>
    </g>
    <rect x="23" y="15" width="18" height="34" rx="6" fill="#FFFFFF"/>
    <circle cx="32" cy="33" r="6" fill="none" stroke="#C97A44" stroke-width="3.2"/>
    <circle cx="32" cy="33" r="2.4" fill="#C97A44"/>
  </g>

  <!-- wordmark -->
  <text x="90" y="59" class="wm"><tspan class="ink">Ask</tspan><tspan class="acc">Biz</tspan></text>
</svg>
