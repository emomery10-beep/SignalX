<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskBiz – Sidebar Mockup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: #f7f7f5;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 240px;
      background: #fff;
      border-right: 1px solid #e8e8e6;
      display: flex;
      flex-direction: column;
      height: 100vh;
      flex-shrink: 0;
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 16px 14px 12px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: #d08a59;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -.025em; color: #1a1a1a; }

    /* ── Tab switcher (like Chat / Cowork / Code) ── */
    .tab-row {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 10px 12px;
    }
    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 6px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: inherit;
      transition: all .12s;
    }
    .tab:hover { background: #f5f5f3; color: #444; }
    .tab.active {
      background: #fff;
      color: #1a1a1a;
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,.1), 0 0 0 1px #e8e8e6;
    }

    /* ── Nav list (like New session / Routines / Customize / More) ── */
    .nav-list { padding: 0 8px 4px; }

    .nav-new {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 10px;
      font-size: 13px; font-weight: 500; color: #444;
      cursor: pointer; border: none; background: transparent;
      font-family: inherit; width: 100%; margin-bottom: 2px;
      transition: background .12s;
    }
    .nav-new:hover { background: #f5f5f3; }

    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 10px;
      font-size: 13px; font-weight: 500; color: #555;
      cursor: pointer; margin-bottom: 2px;
      transition: background .12s; text-decoration: none;
    }
    .nav-item:hover { background: #f5f5f3; }

    .nav-more {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 10px;
      font-size: 13px; font-weight: 500; color: #999;
      cursor: pointer; border: none; background: transparent;
      font-family: inherit; width: 100%; margin-top: 2px;
      transition: background .12s;
    }
    .nav-more:hover { background: #f5f5f3; }
    .chevron { margin-left: auto; }

    /* Divider */
    .divider { height: 1px; background: #efefed; margin: 6px 10px; }

    /* Recents */
    .recents-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 12px 4px;
      font-size: 11px; font-weight: 600; color: #bbb;
      letter-spacing: .04em;
    }
    .hist-items { padding: 2px 8px; flex: 1; overflow-y: auto; }
    .hist-item {
      padding: 5px 9px; border-radius: 7px;
      font-size: 12px; color: #888;
      cursor: pointer; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 1px;
    }
    .hist-item:hover { background: #f5f5f3; }

    /* Footer */
    .upgrade-row { padding: 6px 10px 4px; border-top: 1px solid #efefed; }
    .upgrade-link {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px; border-radius: 8px;
      font-size: 12px; font-weight: 600; color: #d08a59;
      border: 1px solid rgba(208,138,89,.25);
      background: rgba(208,138,89,.06);
      cursor: pointer;
    }
    .user-row {
      display: flex; align-items: center; gap: 9px;
      padding: 6px 12px 14px; cursor: pointer;
    }
    .user-row:hover { background: #f5f5f3; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #d08a59;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .user-name { font-size: 12px; font-weight: 600; color: #1a1a1a; }
    .user-plan { font-size: 10px; color: #aaa; }

    /* ══ MAIN (placeholder) ══ */
    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #bbb; font-size: 14px;
    }
  </style>
</head>
<body>

<aside class="sidebar">

  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 32 32" fill="none">
        <rect x="3" y="22" width="5" height="7" rx="1.5" fill="white" opacity="0.45"/>
        <rect x="11" y="16" width="5" height="13" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="19" y="9" width="5" height="20" rx="1.5" fill="white"/>
        <path d="M21 7L24 3L27 7" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-text">AskBiz</span>
  </div>

  <!-- Tab switcher: Home / Ask / My Business -->
  <div class="tab-row">
    <button class="tab">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="tab active">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Ask
    </button>
    <button class="tab">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
      Business
    </button>
  </div>

  <!-- Nav list: New question / Business Tools / Dashboard / Forecasts / More -->
  <div class="nav-list">
    <button class="nav-new">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New question
    </button>

    <a class="nav-item" href="#">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 0-2-2V9m0 0h18"/></svg>
      Business Tools
    </a>

    <a class="nav-item" href="#">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>

    <a class="nav-item" href="#">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Forecasts
    </a>

    <button class="nav-more">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      More
    </button>
  </div>

  <div class="divider"></div>

  <!-- Recents -->
  <div class="recents-header">
    Recents
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="6" y1="18" x2="20" y2="18"/></svg>
  </div>
  <div class="hist-items">
    <div class="hist-item">how much to send a 2kg parcel...</div>
    <div class="hist-item">Which supplier has the best deliv...</div>
    <div class="hist-item">tracking RR123456789CN</div>
    <div class="hist-item">ask anything</div>
  </div>

  <!-- Footer -->
  <div class="upgrade-row">
    <div class="upgrade-link">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      Upgrade plan
    </div>
  </div>
  <div class="user-row">
    <div class="avatar">E</div>
    <div>
      <div class="user-name">emomery10</div>
      <div class="user-plan">Starter plan</div>
    </div>
  </div>

</aside>

<main class="main">← Sidebar preview</main>

</body>
</html>
